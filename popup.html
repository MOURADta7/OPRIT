<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ORBIT Settings</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <div class="header">
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="#00d4ff" stroke-width="2"/>
          <circle cx="12" cy="12" r="4" fill="#00d4ff"/>
          <path d="M12 2 L12 6 M12 18 L12 22 M2 12 L6 12 M18 12 L22 12" stroke="#00d4ff" stroke-width="2"/>
        </svg>
        <span>ORBIT</span>
      </div>
      <div class="version">v1.0.0</div>
    </div>

    <!-- Status Card -->
    <div class="status-card">
      <div class="status-icon" id="status-icon">
        <span class="status-dot"></span>
      </div>
      <div class="status-info">
        <div class="status-title" id="status-title">Not Signed In</div>
        <div class="status-desc" id="status-desc">Sign in to get started</div>
      </div>
    </div>

    <!-- Quick Stats -->
    <div class="quick-stats">
      <div class="stat-box">
        <div class="stat-number" id="stat-responses">0</div>
        <div class="stat-label">Responses</div>
      </div>
      <div class="stat-box">
        <div class="stat-number" id="stat-time">0h</div>
        <div class="stat-label">Time Saved</div>
      </div>
      <div class="stat-box">
        <div class="stat-number" id="stat-comments">0</div>
        <div class="stat-label">Comments</div>
      </div>
      <div class="stat-box">
        <div class="stat-number" id="stat-replies">0</div>
        <div class="stat-label">Replies Approved</div>
      </div>
    </div>

    <!-- Sign In Section (shown when not signed in) -->
    <div id="signin-section" class="section">
      <button class="btn-primary" id="signin-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Sign in with Google
      </button>
    </div>

    <!-- Dashboard Section (shown when signed in) -->
    <div id="dashboard-section" class="section hidden">
      <h3>Dashboard</h3>
      <p style="color: var(--text-muted); font-size: 13px;">Welcome back! ORBIT is ready to assist you.</p>
    </div>

    <!-- Hidden Financial Section -->
    <div id="financial-section" style="display:none">
      <div class="quick-stats">
        <div class="stat-box">
          <div class="stat-number" id="stat-revenue">$0</div>
          <div class="stat-label">Revenue</div>
        </div>
        <div class="stat-box">
          <div class="stat-number" id="stat-sales">0</div>
          <div class="stat-label">Sales</div>
        </div>
        <div class="stat-box">
          <div class="stat-number" id="stat-refund">0%</div>
          <div class="stat-label">Refund Rate</div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <p>🔒 Your data never leaves your device</p>
      <div class="links">
        <a href="#" id="help-link">Help</a>
        <span>•</span>
        <a href="#" id="privacy-link">Privacy</a>
        <span>•</span>
        <a href="#" id="feedback-link">Feedback</a>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
